name: Run defence news scraper

on:
  schedule:
    # JST 10:00 = UTC 01:00
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper and save result
        run: |
          python defence-news.py > result.md

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: defence-news-result
          path: result.md